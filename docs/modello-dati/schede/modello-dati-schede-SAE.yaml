openapi: 3.0.0
info:
  title: Modello Dati - Scheda SAE - Scheda di anticipata esecuzione
  version: 1.0.0
components:
  schemas:
    DatiAnticipataEsecuzioneType:
      description: Oggetto che riporta i dati di anticipata esecuzione
      type: object
      additionalProperties: false
      required: [consegnaSottoRiserva,dataEffettivoInizio,dataFinePrevista]
      properties:
        dataDisposizioneInizio:
          description: Data disposizione dell’inizio della prog. Esecutiva
          type: string
          format: date-time
        dataApprovazione:
          description: Data approvazione del  progetto Esecutivo
          type: string
          format: date-time          
        avvioPerFasi:
          description: L'avvio dell'esecuzione del contratto e' per fasi
          type: boolean
        dataVerbalePrimaConsegna:
          description: Data verbale prima consegna lavori
          type: string
          format: date-time
        dataAvvioPrimaFase:
          description: Data di avvio della prima fase dell'esecuzione del contratto
          type: string
          format: date-time        
        dataEffettivoInizio:
          description: Data di effettivo inizio lavori/servizi/forniture (consegna completa/avvio di tutte le prestazioni del contratto)
          type: string
          format: date-time
        dataFinePrevista:
          description: Data fine prevista per dare ultimazione ai lavori/servizi/forniture 
          type: string
          format: date-time
    AnacFormSAEType:
      description: Contiene tutti i dati di anticipata esecuzione
      type: object
      additionalProperties: false
      required: [datiAnticipataEsecuzione]
      properties: 
        datiAnticipataEsecuzione:
          $ref: '#/components/schemas/DatiAnticipataEsecuzioneType'
    SchedaSAEType:
      description: Anticipata esecuzione
      type: object
      required: [anacForm]
      additionalProperties: false
      properties:
        anacForm:
          $ref: '#/components/schemas/AnacFormSAEType'