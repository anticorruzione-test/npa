openapi: 3.0.0
info:
  title: Modello Dati - Scheda CO1_3 - Scheda di conclusione ordinaria.
  version: 1.0.0
components:
  schemas:
    ConclusioneType:
      description: Oggetto che riporta i dati di conclusione ordinaria.
      type: object
      additionalProperties: false
      required: [dataUltimazione]
      properties:
        dataStipula:
          description: Data stipula del contratto
          type: string
          format: date-time            
        dataEsecutivita:
          description: Data esecutività del contratto (ove prevista)
          type: string
          format: date-time          
        importo: 
          description: Importo
          type: number
          format: double
        incamerataPolizza:
          description: Incamerata polizza
          type: boolean
        dataUltimazione:
          description: Data di ultimazione della prestazione
          type: string
          format: date-time          
        numeroInfortuni:
          description: Numero di infortuni
          type: number
          format: integer
        diCuiPostumiPermanenti:
          description: di cui con postumi permanenti
          type: number
          format: integer 
        diCuiMortali:
          description: di cui mortali
          type: number
          format: integer          
    AnacFormCO1_3Type:
      description: Contiene tutti i dati di conclusione ordinaria
      type: object
      additionalProperties: false
      required: [idContratto,conclusione]
      properties:
        idContratto:
          description: identificativo del contratto restituito in response alla scheda di Sottoscrizione del contratto.
          type: string   
          format: uuid
          example: "f81d4fae-7dec-11d0-a765-00a0c91e6bf6" 
        conclusione:
          $ref: '#/components/schemas/ConclusioneType'
    SchedaCO1_3Type:
      description: Scheda di conclusione
      type: object
      required: [anacForm]
      additionalProperties: false
      properties:
        anacForm:
          $ref: '#/components/schemas/AnacFormCO1_3Type'