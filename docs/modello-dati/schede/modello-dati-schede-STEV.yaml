openapi: 3.0.0
info:
  title: Modello Dati - Scheda STEV - Scheda di Terminazione Verifiche FVOE (STEV).
  description: | 
    La scheda STEV (Scheda di Terminazione Verifiche FVOE) è una scheda di comunicazione della terminazione delle verifiche FVOE per mancata prosecuzione della procedura di affidamento a seguito di una preliminare consultazione di mercato.\
    La nuova scheda STEV segue una scheda SIM (scheda di Indagine di Mercato) al termine delle verifiche FVOE quando si decide di non proseguire con la procedura di affidamento e va in uno STATO FINALE.\
    La scheda sarà collegata alla precedente scheda SIM tramite il campo ‘ID pianificazione’  oppure attraverso un nuovo campo ad hoc che colleghi la SIM con la STEV.
  version: 1.0.0
components:
  schemas:
    AnacFormSTEVType:
      description: Contiene i dati per la scheda di conclusione SDA.
      type: object
      required: [idSTEV,dataAvvioVerificheFVOE] 
      additionalProperties: false 
      properties:
        idSTEV:
          description: id restituito dal servizio all'invio della scheda  SIM
          type: string  
          format: uuid      
        dataAvvioVerificheFVOE:
          $ref: 'https://raw.githubusercontent.com/anticorruzione-test/npa/main/docs/modello-dati/schede/modello-dati-schede-dati-comuni.yaml#/components/schemas/dataAvvioVerificheSTEVType'
        dataChiusuraOperazioniVerificheFVOE:
          $ref: 'https://raw.githubusercontent.com/anticorruzione-test/npa/main/docs/modello-dati/schede/modello-dati-schede-dati-comuni.yaml#/components/schemas/dataChiusuraOperazioniVerificheSTEVType'      
        motivazioneChiusuraVerificheFVOE:
          $ref: 'https://raw.githubusercontent.com/anticorruzione-test/npa/main/docs/modello-dati/schede/modello-dati-schede-dati-comuni.yaml#/components/schemas/motivazioneChiusuraVerificheSTEVType'
    SchedaSTEVType:
      description: Scheda di Terminazione Verifiche FVOE (STEV).
      type: object
      required: [anacForm]
      additionalProperties: false
      properties:
        anacForm:
          $ref: '#/components/schemas/AnacFormSTEVType'